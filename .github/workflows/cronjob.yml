name: cron job test

on:
    schedule:
        - cron: '18 19 * * *'
    workflow_dispatch:

jobs:
    run-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.14'

            - name: Run Python script
              run: python cv-generator-backend/pipeline/scraper.py 